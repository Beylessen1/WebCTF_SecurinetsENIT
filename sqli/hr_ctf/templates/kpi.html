
{% extends "base.html" %}

{% block title %}KPI - HR System{% endblock %}

{% block content %}
<div class="container">
    <header>
        <h1>📊 KPI MANAGEMENT</h1>
        <p class="subtitle"><span class="terminal-prompt">$</span> Add performance metrics</p>
    </header>

    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label for="employee_id"><span class="terminal-prompt">></span> Employee ID:</label>
                <input type="number" id="employee_id" name="employee_id" placeholder="Enter employee ID..." required>
            </div>

            <div class="form-group">
                <label for="metric"><span class="terminal-prompt">></span> Metric Name:</label>
                <input type="text" id="metric" name="metric" placeholder="e.g., Sales, Productivity..." required>
            </div>

            <div class="form-group">
                <label for="value"><span class="terminal-prompt">></span> Value:</label>
                <input type="number" id="value" name="value" placeholder="Enter numeric value..." required>
            </div>

            <button type="submit">ADD KPI</button>
        </form>
    </div>

    <a href="/" class="back-link">← Back to Main Menu</a>
</div>
{% endblock %}
