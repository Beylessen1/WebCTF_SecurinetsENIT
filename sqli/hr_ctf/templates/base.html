
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR Management System{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff41;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 65, 0.03) 0px,
                    transparent 1px,
                    transparent 2px,
                    rgba(0, 255, 65, 0.03) 3px
                );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #00ff41;
            margin-bottom: 40px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
        }

        h1 {
            font-size: 3em;
            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
            letter-spacing: 4px;
        }

        .subtitle {
            color: #00cc33;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .nav-card {
            background: rgba(0, 255, 65, 0.05);
            border: 2px solid #00ff41;
            padding: 30px;
            text-decoration: none;
            color: #00ff41;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: block;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-card:hover::before {
            opacity: 1;
        }

        .nav-card:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            transform: translateY(-5px);
        }

        .nav-card h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
            text-shadow: 0 0 5px #00ff41;
        }

        .nav-card p {
            color: #00cc33;
            line-height: 1.6;
        }

        .form-container {
            background: rgba(0, 255, 65, 0.05);
            border: 2px solid #00ff41;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1em;
            text-shadow: 0 0 5px #00ff41;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            border-color: #00ff41;
        }

        button {
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 12px 30px;
            font-size: 1.1em;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00cc33;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(0, 255, 65, 0.05);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border: 1px solid #00ff41;
        }

        th {
            background: rgba(0, 255, 65, 0.1);
            text-shadow: 0 0 5px #00ff41;
        }

        tr:hover {
            background: rgba(0, 255, 65, 0.08);
        }

        .forbidden {
            text-align: center;
            padding: 100px 20px;
        }

        .forbidden h1 {
            font-size: 8em;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .forbidden p {
            font-size: 1.5em;
            margin-top: 20px;
        }

        .terminal-prompt {
            color: #00cc33;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
