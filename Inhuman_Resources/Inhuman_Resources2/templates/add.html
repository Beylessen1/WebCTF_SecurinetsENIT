
{% extends "base.html" %}

{% block title %}Search - HR System{% endblock %}

{% block content %}
<div class="container">
    <header>
        <h1>🔍 EMPLOYEE SEARCH</h1>
        <p class="subtitle"><span class="terminal-prompt">$</span> Query employee database</p>
    </header>

    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label for="name"><span class="terminal-prompt">></span> Enter Employee Name:</label>
                <input type="text" id="name" name="name" placeholder="Search by name..." required>
            </div>
            <button type="submit">EXECUTE QUERY</button>
        </form>
    </div>

    <a href="/" class="back-link">← Back to Main Menu</a>
</div>
{% endblock %}
